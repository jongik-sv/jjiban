version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jjiban-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jjiban
      POSTGRES_PASSWORD: jjiban_password
      POSTGRES_DB: jjiban_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
