<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>

  <!-- Main Window -->
  <rect x="10" y="10" width="780" height="580" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Title Bar -->
  <rect x="10" y="10" width="780" height="30" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <text x="20" y="30" font-family="Arial" font-size="14">CD0100 - 코드카테고리관리</text>
  <text x="730" y="30" font-family="Arial" font-size="14">[ _ ]</text>
  <text x="760" y="30" font-family="Arial" font-size="14">[ X ]</text>

  <!-- Search Area -->
  <rect x="10" y="40" width="780" height="40" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="20" y="65" font-family="Arial" font-size="14">마루 선택:</text>
  <rect x="100" y="50" width="300" height="25" fill="white" stroke="#999"/>
  <text x="110" y="66" font-family="Arial" font-size="14">DEPT_001 - 부서코드 (INUSE) ▼</text>
  <rect x="700" y="50" width="80" height="25" fill="#d3d3d3" stroke="#999"/>
  <text x="715" y="66" font-family="Arial" font-size="14">새로고침</text>

  <!-- Button Bar -->
  <rect x="10" y="80" width="780" height="40" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <rect x="20" y="90" width="50" height="25" fill="#d3d3d3" stroke="#999"/><text x="30" y="106" font-family="Arial" font-size="14">신규</text>
  <rect x="80" y="90" width="50" height="25" fill="#d3d3d3" stroke="#999"/><text x="90" y="106" font-family="Arial" font-size="14">수정</text>
  <rect x="140" y="90" width="50" height="25" fill="#d3d3d3" stroke="#999"/><text x="150" y="106" font-family="Arial" font-size="14">삭제</text>
  <rect x="200" y="90" width="50" height="25" fill="#d3d3d3" stroke="#999"/><text x="210" y="106" font-family="Arial" font-size="14">저장</text>
  <rect x="260" y="90" width="50" height="25" fill="#d3d3d3" stroke="#999"/><text x="270" y="106" font-family="Arial" font-size="14">취소</text>
  <text x="730" y="105" font-family="Arial" font-size="14">총 5건</text>

  <!-- Grid Area -->
  <rect x="20" y="130" width="760" height="180" fill="white" stroke="#ccc"/>
  <text x="30" y="145" font-family="Arial" font-size="14" font-weight="bold">카테고리 목록</text>
  <!-- Grid Header -->
  <rect x="20" y="160" width="760" height="30" fill="#f2f2f2" stroke-bottom="#ccc"/>
  <text x="30" y="180" font-family="Arial" font-size="12">□</text>
  <text x="60" y="180" font-family="Arial" font-size="12">카테고리ID</text>
  <text x="180" y="180" font-family="Arial" font-size="12">카테고리명</text>
  <text x="320" y="180" font-family="Arial" font-size="12">코드타입</text>
  <text x="450" y="180" font-family="Arial" font-size="12">코드정의</text>
  <text x="650" y="180" font-family="Arial" font-size="12">순번</text>
  <!-- Grid Rows -->
  <rect x="20" y="190" width="760" height="30" fill="#e8f0fe" stroke-bottom="#eee"/>
  <text x="30" y="210" font-family="Arial" font-size="12">☑</text>
  <text x="60" y="210" font-family="Arial" font-size="12">DEPT_LEVEL</text>
  <text x="180" y="210" font-family="Arial" font-size="12">부서레벨</text>
  <text x="320" y="210" font-family="Arial" font-size="12">Normal</text>
  <text x="450" y="210" font-family="Arial" font-size="12">1,2,3,4,5</text>
  <text x="650" y="210" font-family="Arial" font-size="12">1</text>

  <rect x="20" y="220" width="760" height="30" fill="white" stroke-bottom="#eee"/>
  <text x="30" y="240" font-family="Arial" font-size="12">□</text>
  <text x="60" y="240" font-family="Arial" font-size="12">DEPT_TYPE</text>
  <text x="180" y="240" font-family="Arial" font-size="12">부서유형</text>
  <text x="320" y="240" font-family="Arial" font-size="12">Normal</text>
  <text x="450" y="240" font-family="Arial" font-size="12">사업부,지원부</text>
  <text x="650" y="240" font-family="Arial" font-size="12">2</text>

  <rect x="20" y="250" width="760" height="30" fill="white" stroke-bottom="#eee"/>
  <text x="30" y="270" font-family="Arial" font-size="12">□</text>
  <text x="60" y="270" font-family="Arial" font-size="12">DEPT_CODE</text>
  <text x="180" y="270" font-family="Arial" font-size="12">부서코드패턴</text>
  <text x="320" y="270" font-family="Arial" font-size="12">RegEx</text>
  <text x="450" y="270" font-family="Arial" font-size="12">^[A-Z]{3}$</text>
  <text x="650" y="270" font-family="Arial" font-size="12">3</text>

  <!-- Detail Area -->
  <rect x="20" y="320" width="760" height="220" fill="white" stroke="#ccc"/>
  <text x="30" y="335" font-family="Arial" font-size="14" font-weight="bold">카테고리 상세 정보</text>

  <text x="40" y="360" font-family="Arial" font-size="14">카테고리 ID:</text>
  <rect x="150" y="345" width="200" height="25" fill="white" stroke="#999"/>
  <text x="160" y="361" font-family="Arial" font-size="14">DEPT_LEVEL</text>
  <text x="360" y="360" font-family="Arial" font-size="14" fill="red">(*)</text>

  <text x="40" y="390" font-family="Arial" font-size="14">카테고리명:</text>
  <rect x="150" y="375" width="300" height="25" fill="white" stroke="#999"/>
  <text x="160" y="391" font-family="Arial" font-size="14">부서레벨</text>
  <text x="460" y="390" font-family="Arial" font-size="14" fill="red">(*)</text>

  <text x="40" y="420" font-family="Arial" font-size="14">코드 타입:</text>
  <rect x="150" y="405" width="120" height="25" fill="white" stroke="#999"/>
  <text x="160" y="421" font-family="Arial" font-size="14">Normal ▼</text>
  <text x="280" y="420" font-family="Arial" font-size="14" fill="red">(*)</text>
  <text x="310" y="420" font-family="Arial" font-size="12" fill="#666">[가이드: 콤마로 구분된 값 목록]</text>

  <text x="40" y="450" font-family="Arial" font-size="14">코드 정의:</text>
  <rect x="150" y="435" width="400" height="25" fill="white" stroke="#999"/>
  <text x="160" y="451" font-family="Arial" font-size="14">1,2,3,4,5</text>
  <text x="560" y="450" font-family="Arial" font-size="14" fill="red">(*)</text>
  <text x="150" y="475" font-family="Arial" font-size="12" fill="green">✓ 검증 성공: 5개의 유효한 값이 정의되었습니다</text>

  <text x="40" y="500" font-family="Arial" font-size="14">정렬 순서:</text>
  <rect x="150" y="485" width="80" height="25" fill="white" stroke="#999"/>
  <text x="160" y="501" font-family="Arial" font-size="14">1</text>

  <text x="40" y="525" font-family="Arial" font-size="12" fill="#333">버전 정보: VERSION: 0 | 시작일: 2025-10-04 | 종료일: 9999-12-31</text>
  <text x="40" y="545" font-family="Arial" font-size="12" fill="#333">마루 상태: <tspan fill="green">🟢 INUSE</tspan> (수정 시 새 버전이 생성됩니다)</text>

  <!-- Status Bar -->
  <rect x="10" y="550" width="780" height="40" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <text x="20" y="575" font-family="Arial" font-size="14">상태: 준비 | 사용자: PoC Admin | 시간: 2025-10-04 14:30:25</text>
</svg>