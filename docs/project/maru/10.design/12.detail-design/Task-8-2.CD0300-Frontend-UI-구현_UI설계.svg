<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    CD0300 - 코드 검증 관리 화면 (Nexacro Form)
  </text>

  <!-- Main Form Container -->
  <rect x="50" y="60" width="1100" height="800" fill="#F5F5F5" stroke="#333" stroke-width="2" rx="5"/>

  <!-- Header Section -->
  <rect x="70" y="80" width="1060" height="100" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="90" y="105" font-size="14" font-weight="bold" fill="#1976D2">검색 조건</text>

  <!-- Maru Selection Dropdown -->
  <text x="90" y="135" font-size="12" fill="#555">마루 선택:</text>
  <rect x="180" y="120" width="400" height="30" fill="#FFF" stroke="#999" stroke-width="1" rx="3"/>
  <text x="190" y="140" font-size="11" fill="#333">DEPT_001 - 부서코드</text>
  <polygon points="570,130 565,125 575,125" fill="#666"/>
  <circle cx="185" cy="135" r="3" fill="#4CAF50" data-testid="cmb-maru-select"/>

  <!-- Validate Button -->
  <rect x="600" y="120" width="120" height="30" fill="#2196F3" stroke="#1565C0" stroke-width="1" rx="3"/>
  <text x="660" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">검증 실행</text>
  <circle cx="605" cy="135" r="3" fill="#FFF" data-testid="btn-validate"/>

  <!-- Excel Export Button -->
  <rect x="740" y="120" width="140" height="30" fill="#4CAF50" stroke="#388E3C" stroke-width="1" rx="3"/>
  <text x="810" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">Excel 내보내기</text>
  <circle cx="745" cy="135" r="3" fill="#FFF" data-testid="btn-export-excel"/>

  <!-- Statistics Section -->
  <rect x="70" y="200" width="1060" height="80" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="90" y="225" font-size="14" font-weight="bold" fill="#1976D2">검증 결과 통계</text>

  <!-- Statistics Cards -->
  <rect x="90" y="235" width="240" height="35" fill="#FFF" stroke="#2196F3" stroke-width="1" rx="3"/>
  <text x="110" y="255" font-size="11" fill="#666">전체:</text>
  <text x="280" y="255" font-size="13" font-weight="bold" text-anchor="end" fill="#333">150건</text>

  <rect x="350" y="235" width="240" height="35" fill="#FFF" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="370" y="255" font-size="11" fill="#666">유효:</text>
  <text x="540" y="255" font-size="13" font-weight="bold" text-anchor="end" fill="#4CAF50">140건</text>

  <rect x="610" y="235" width="240" height="35" fill="#FFF" stroke="#F44336" stroke-width="1" rx="3"/>
  <text x="630" y="255" font-size="11" fill="#666">무효:</text>
  <text x="800" y="255" font-size="13" font-weight="bold" text-anchor="end" fill="#F44336">10건</text>

  <rect x="870" y="235" width="240" height="35" fill="#FFF" stroke="#FF9800" stroke-width="1" rx="3"/>
  <text x="890" y="255" font-size="11" fill="#666">검증율:</text>
  <text x="1060" y="255" font-size="13" font-weight="bold" text-anchor="end" fill="#FF9800">93.3%</text>

  <!-- Filter Section -->
  <rect x="70" y="300" width="1060" height="60" fill="#FFFFFF" stroke="#999" stroke-width="1" rx="5"/>
  <text x="90" y="325" font-size="13" font-weight="bold" fill="#555">필터</text>

  <!-- Radio Buttons -->
  <circle cx="90" cy="345" r="6" fill="none" stroke="#666" stroke-width="1"/>
  <text x="105" y="350" font-size="11" fill="#666">전체</text>

  <circle cx="160" cy="345" r="6" fill="none" stroke="#666" stroke-width="1"/>
  <text x="175" y="350" font-size="11" fill="#666">VALID만</text>

  <circle cx="250" cy="345" r="6" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <circle cx="250" cy="345" r="3" fill="#FFF"/>
  <text x="265" y="350" font-size="11" font-weight="bold" fill="#2196F3">INVALID만</text>

  <!-- Error Type Dropdown -->
  <text x="380" y="350" font-size="11" fill="#666">오류 타입:</text>
  <rect x="460" y="335" width="300" height="25" fill="#FFF" stroke="#999" stroke-width="1" rx="3"/>
  <text x="470" y="352" font-size="10" fill="#333">전체</text>
  <text x="510" y="352" font-size="9" fill="#999">/ DEFINITION_MISMATCH / REGEX_MISMATCH / DUPLICATE_CODE</text>
  <polygon points="755,345 750,340 760,340" fill="#666"/>

  <!-- Grid Section -->
  <rect x="70" y="380" width="1060" height="440" fill="#FFFFFF" stroke="#999" stroke-width="2" rx="5"/>
  <text x="90" y="405" font-size="14" font-weight="bold" fill="#555">검증 결과 목록</text>

  <!-- Grid Header -->
  <rect x="90" y="415" width="1040" height="35" fill="#1976D2" stroke="#1565C0" stroke-width="1"/>
  <text x="110" y="436" font-size="11" font-weight="bold" fill="#FFF">상태</text>
  <text x="180" y="436" font-size="11" font-weight="bold" fill="#FFF">카테고리</text>
  <text x="320" y="436" font-size="11" font-weight="bold" fill="#FFF">코드</text>
  <text x="420" y="436" font-size="11" font-weight="bold" fill="#FFF">코드명</text>
  <text x="600" y="436" font-size="11" font-weight="bold" fill="#FFF">오류 타입</text>
  <text x="820" y="436" font-size="11" font-weight="bold" fill="#FFF">오류 메시지</text>
  <text x="1050" y="436" font-size="11" font-weight="bold" fill="#FFF">상세</text>

  <!-- Grid Row 1 (VALID) -->
  <rect x="90" y="450" width="1040" height="30" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1"/>
  <text x="110" y="470" font-size="12" fill="#4CAF50">✓</text>
  <text x="180" y="470" font-size="10" fill="#333">DEPT_LEVEL</text>
  <text x="320" y="470" font-size="10" fill="#333">1</text>
  <text x="420" y="470" font-size="10" fill="#333">1급</text>
  <text x="600" y="470" font-size="10" fill="#999">-</text>
  <text x="820" y="470" font-size="10" fill="#999">-</text>

  <!-- Grid Row 2 (INVALID - DEFINITION_MISMATCH) -->
  <rect x="90" y="480" width="1040" height="30" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="1"/>
  <text x="110" y="500" font-size="12" fill="#F44336">✗</text>
  <text x="180" y="500" font-size="10" fill="#333">DEPT_LEVEL</text>
  <text x="320" y="500" font-size="10" fill="#333">LEVEL99</text>
  <text x="420" y="500" font-size="10" fill="#333">최고레벨</text>
  <text x="600" y="500" font-size="9" fill="#D32F2F">정의불일치</text>
  <text x="820" y="500" font-size="9" fill="#666">허용값 아님 (1,2,3,4,5)</text>
  <rect x="1050" y="485" width="50" height="20" fill="#2196F3" stroke="#1976D2" stroke-width="1" rx="2"/>
  <text x="1075" y="498" font-size="9" font-weight="bold" text-anchor="middle" fill="#FFF">상세</text>
  <circle cx="1055" cy="495" r="2" fill="#FFF" data-testid="btn-detail-row1"/>

  <!-- Grid Row 3 (INVALID - REGEX_MISMATCH) -->
  <rect x="90" y="510" width="1040" height="30" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="1"/>
  <text x="110" y="530" font-size="12" fill="#F44336">✗</text>
  <text x="180" y="530" font-size="10" fill="#333">DEPT_CODE</text>
  <text x="320" y="530" font-size="10" fill="#333">dept001</text>
  <text x="420" y="530" font-size="10" fill="#333">경영지원팀</text>
  <text x="600" y="530" font-size="9" fill="#E91E63">정규식불일치</text>
  <text x="820" y="530" font-size="9" fill="#666">패턴 미일치 (^[A-Z]{2}[0-9]{4}$)</text>
  <rect x="1050" y="515" width="50" height="20" fill="#2196F3" stroke="#1976D2" stroke-width="1" rx="2"/>
  <text x="1075" y="528" font-size="9" font-weight="bold" text-anchor="middle" fill="#FFF">상세</text>

  <!-- Grid Row 4 (INVALID - DUPLICATE_CODE) -->
  <rect x="90" y="540" width="1040" height="30" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="1"/>
  <text x="110" y="560" font-size="12" fill="#F44336">✗</text>
  <text x="180" y="560" font-size="10" fill="#333">DEPT_TYPE</text>
  <text x="320" y="560" font-size="10" fill="#333">TYPE001</text>
  <text x="420" y="560" font-size="10" fill="#333">사업부</text>
  <text x="600" y="560" font-size="9" fill="#9C27B0">중복코드</text>
  <text x="820" y="560" font-size="9" fill="#666">2개 발견</text>
  <rect x="1050" y="545" width="50" height="20" fill="#2196F3" stroke="#1976D2" stroke-width="1" rx="2"/>
  <text x="1075" y="558" font-size="9" font-weight="bold" text-anchor="middle" fill="#FFF">상세</text>

  <!-- Grid ... (More Rows) -->
  <text x="550" y="590" font-size="11" text-anchor="middle" fill="#999">...</text>

  <!-- Grid Pagination -->
  <rect x="90" y="780" width="1040" height="30" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1080" y="798" font-size="10" text-anchor="end" fill="#666">[10 / 150]</text>

  <!-- Detail Popup Overlay (Conceptual) -->
  <rect x="300" y="150" width="600" height="500" fill="#FFF" stroke="#333" stroke-width="3" rx="10" opacity="0.95" data-testid="popup-detail"/>
  <rect x="300" y="150" width="600" height="40" fill="#1976D2" rx="10"/>
  <text x="600" y="175" font-size="15" font-weight="bold" text-anchor="middle" fill="#FFF">오류 상세 정보</text>
  <circle x="870" cy="170" r="12" fill="#F44336" stroke="#C62828" stroke-width="1"/>
  <text x="870" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">X</text>

  <!-- Popup Content -->
  <text x="320" y="215" font-size="11" font-weight="bold" fill="#555">카테고리:</text>
  <text x="400" y="215" font-size="11" fill="#333">DEPT_LEVEL (부서레벨)</text>

  <text x="320" y="240" font-size="11" font-weight="bold" fill="#555">코드:</text>
  <text x="400" y="240" font-size="11" fill="#333">LEVEL99</text>

  <text x="320" y="265" font-size="11" font-weight="bold" fill="#555">코드명:</text>
  <text x="400" y="265" font-size="11" fill="#333">최고레벨</text>

  <line x1="320" y1="280" x2="880" y2="280" stroke="#E0E0E0" stroke-width="1"/>

  <text x="320" y="300" font-size="11" font-weight="bold" fill="#D32F2F">오류 타입:</text>
  <text x="400" y="300" font-size="11" fill="#D32F2F">DEFINITION_MISMATCH (정의 불일치)</text>

  <text x="320" y="325" font-size="11" font-weight="bold" fill="#666">오류 메시지:</text>
  <text x="320" y="345" font-size="10" fill="#666">허용된 값이 아닙니다. 허용값: 1,2,3,4,5</text>

  <line x1="320" y1="360" x2="880" y2="360" stroke="#E0E0E0" stroke-width="1"/>

  <text x="320" y="380" font-size="11" font-weight="bold" fill="#666">코드 정의:</text>
  <rect x="320" y="390" width="560" height="30" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" rx="3"/>
  <text x="330" y="408" font-size="10" font-family="monospace" fill="#333">1,2,3,4,5</text>

  <line x1="320" y1="435" x2="880" y2="435" stroke="#E0E0E0" stroke-width="1"/>

  <text x="320" y="455" font-size="11" font-weight="bold" fill="#FF9800">자동 수정 제안 (향후 기능):</text>
  <text x="340" y="475" font-size="10" fill="#666">• 코드를 "1" ~ "5" 중 하나로 변경</text>
  <text x="340" y="495" font-size="10" fill="#666">• 또는 코드 카테고리 정의를 "1,2,3,4,5,99"로 수정</text>

  <!-- Popup Buttons -->
  <rect x="550" y="600" width="100" height="30" fill="#757575" stroke="#616161" stroke-width="1" rx="3"/>
  <text x="600" y="620" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">닫기</text>

  <rect x="670" y="600" width="120" height="30" fill="#4CAF50" stroke="#388E3C" stroke-width="1" rx="3"/>
  <text x="730" y="620" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">제안 복사</text>

  <!-- Legend -->
  <rect x="50" y="870" width="1100" height="20" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="70" y="884" font-size="9" fill="#666">상호작용 포인트:</text>
  <circle cx="180" cy="880" r="3" fill="#4CAF50"/>
  <text x="190" y="884" font-size="9" fill="#666">클릭 가능</text>
  <circle cx="280" cy="880" r="3" fill="#FFF" stroke="#999" stroke-width="1"/>
  <text x="290" y="884" font-size="9" fill="#666">data-testid 속성</text>
  <text x="900" y="884" font-size="9" fill="#999">Task 8.2 - CD0300 Frontend UI Design (2025-10-05)</text>
</svg>
