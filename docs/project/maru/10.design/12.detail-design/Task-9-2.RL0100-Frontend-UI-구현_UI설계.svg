<svg width="800" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="800" height="700" fill="#f5f5f5"/>

  <!-- 메인 컨테이너 -->
  <rect x="20" y="20" width="760" height="660" fill="white" stroke="#333" stroke-width="2" rx="5"/>

  <!-- 헤더 -->
  <rect x="20" y="20" width="760" height="50" fill="#2c3e50" rx="5 5 0 0"/>
  <text x="40" y="50" fill="white" font-size="18" font-weight="bold">RL0100 - 룰변수관리</text>
  <text x="720" y="50" fill="white" font-size="14">[닫기]</text>

  <!-- 마루 선택 영역 -->
  <rect x="40" y="90" width="720" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="60" y="115" font-size="14">마루선택:</text>
  <rect x="140" y="95" width="400" height="30" fill="white" stroke="#95a5a6" stroke-width="1" rx="3" data-testid="maru-select"/>
  <text x="150" y="116" font-size="13" fill="#555">RULE_001 - 급여계산룰 ▼</text>
  <rect x="560" y="95" width="80" height="30" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="3" data-testid="search-btn"/>
  <text x="585" y="116" fill="white" font-size="13">조회</text>

  <!-- 마스터 그리드 영역 -->
  <text x="40" y="160" font-size="15" font-weight="bold">변수 목록 (마스터)</text>
  <rect x="40" y="170" width="720" height="200" fill="white" stroke="#95a5a6" stroke-width="1" rx="3"/>

  <!-- 그리드 헤더 -->
  <rect x="40" y="170" width="720" height="35" fill="#34495e" rx="3 3 0 0"/>
  <text x="55" y="192" fill="white" font-size="12">SEQ</text>
  <text x="125" y="192" fill="white" font-size="12">POS</text>
  <text x="195" y="192" fill="white" font-size="12">변수타입</text>
  <text x="295" y="192" fill="white" font-size="12">변수명</text>
  <text x="475" y="192" fill="white" font-size="12">데이터타입</text>
  <text x="605" y="192" fill="white" font-size="12">조건타입</text>

  <!-- 그리드 데이터 행 -->
  <rect x="40" y="205" width="720" height="30" fill="#e8f4f8" data-testid="grid-row-1"/>
  <text x="60" y="225" font-size="12">1</text>
  <text x="130" y="225" font-size="12">1</text>
  <text x="200" y="225" font-size="12">OP</text>
  <text x="300" y="225" font-size="12">등급</text>
  <text x="480" y="225" font-size="12">String</text>
  <text x="610" y="225" font-size="12">Equal</text>

  <rect x="40" y="235" width="720" height="30" fill="white"/>
  <text x="60" y="255" font-size="12">2</text>
  <text x="130" y="255" font-size="12">2</text>
  <text x="200" y="255" font-size="12">OP</text>
  <text x="300" y="255" font-size="12">근속연수</text>
  <text x="480" y="255" font-size="12">Number</text>
  <text x="610" y="255" font-size="12">One</text>

  <rect x="40" y="265" width="720" height="30" fill="#e8f4f8"/>
  <text x="60" y="285" font-size="12">3</text>
  <text x="130" y="285" font-size="12">1</text>
  <text x="200" y="285" font-size="12">RSLT</text>
  <text x="300" y="285" font-size="12">지급률</text>
  <text x="480" y="285" font-size="12">Number</text>
  <text x="610" y="285" font-size="12">-</text>

  <!-- 액션 버튼 -->
  <rect x="40" y="385" width="80" height="35" fill="#27ae60" stroke="#229954" stroke-width="1" rx="3" data-testid="new-btn"/>
  <text x="63" y="407" fill="white" font-size="13">신규</text>

  <rect x="130" y="385" width="80" height="35" fill="#f39c12" stroke="#d68910" stroke-width="1" rx="3" data-testid="edit-btn"/>
  <text x="153" y="407" fill="white" font-size="13">수정</text>

  <rect x="220" y="385" width="80" height="35" fill="#e74c3c" stroke="#c0392b" stroke-width="1" rx="3" data-testid="delete-btn"/>
  <text x="243" y="407" fill="white" font-size="13">삭제</text>

  <rect x="310" y="385" width="100" height="35" fill="#9b59b6" stroke="#7d3c98" stroke-width="1" rx="3" data-testid="reorder-btn"/>
  <text x="323" y="407" fill="white" font-size="13">순서변경</text>

  <!-- 디테일 폼 영역 -->
  <text x="40" y="450" font-size="15" font-weight="bold">변수 상세 (디테일)</text>

  <!-- 기본 정보 그룹 -->
  <rect x="40" y="460" width="720" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="3"/>
  <text x="55" y="480" font-size="13" font-weight="bold">기본 정보</text>

  <!-- 변수 타입 라디오 -->
  <text x="65" y="505" font-size="12">변수 타입*:</text>
  <circle cx="180" cy="501" r="6" fill="white" stroke="#555" stroke-width="1" data-testid="radio-op"/>
  <circle cx="180" cy="501" r="3" fill="#3498db"/>
  <text x="195" y="505" font-size="12">OP</text>
  <circle cx="250" cy="501" r="6" fill="white" stroke="#555" stroke-width="1" data-testid="radio-rslt"/>
  <text x="265" y="505" font-size="12">RSLT</text>

  <!-- 변수명 -->
  <text x="65" y="535" font-size="12">변수명*:</text>
  <rect x="180" y="520" width="300" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="var-name-input"/>
  <text x="490" y="535" font-size="11" fill="#6c757d">(20자 이내)</text>

  <!-- 변수 설명 -->
  <text x="65" y="565" font-size="12">변수 설명:</text>
  <rect x="180" y="550" width="500" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="var-desc-input"/>

  <!-- 데이터 타입 -->
  <text x="65" y="595" font-size="12">데이터 타입*:</text>
  <rect x="180" y="580" width="200" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="data-type-select"/>
  <text x="190" y="596" font-size="12">String ▼</text>
  <text x="390" y="595" font-size="11" fill="#6c757d">(String/Number/Boolean)</text>

  <!-- 변수 위치/순서 -->
  <text x="400" y="535" font-size="12">변수 위치(POS)*:</text>
  <rect x="540" y="520" width="60" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="pos-input"/>
  <text x="550" y="536" font-size="12">1</text>
  <text x="610" y="535" font-size="11" fill="#6c757d">(1~20)</text>

  <text x="400" y="565" font-size="12">표시 순서(SEQ)*:</text>
  <rect x="540" y="550" width="60" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="seq-input"/>
  <text x="550" y="566" font-size="12">1</text>

  <!-- 조건 타입 그룹 -->
  <rect x="40" y="620" width="720" height="50" fill="#fff3cd" stroke="#ffc107" stroke-width="1" rx="3"/>
  <text x="55" y="640" font-size="13" font-weight="bold">조건 타입 (OP만 활성화)</text>
  <text x="65" y="660" font-size="12">조건 타입*:</text>
  <rect x="180" y="645" width="200" height="25" fill="white" stroke="#ced4da" stroke-width="1" rx="2" data-testid="cond-type-select"/>
  <text x="190" y="661" font-size="12">Equal ▼</text>
  <text x="390" y="660" font-size="11" fill="#6c757d">(Equal/One/Two)</text>

  <!-- 저장/취소 버튼 -->
  <rect x="600" y="640" width="80" height="35" fill="#28a745" stroke="#218838" stroke-width="1" rx="3" data-testid="save-btn"/>
  <text x="625" y="662" fill="white" font-size="13">저장</text>

  <rect x="690" y="640" width="80" height="35" fill="#6c757d" stroke="#5a6268" stroke-width="1" rx="3" data-testid="cancel-btn"/>
  <text x="710" y="662" fill="white" font-size="13">취소</text>

  <!-- 상호작용 포인트 표시 -->
  <circle cx="350" cy="110" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="600" cy="110" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="380" cy="220" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="380" cy="532" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="640" cy="657" r="5" fill="#e74c3c" opacity="0.7"/>
</svg>
