<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1400" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1400" fill="#f8f9fa"/>

  <!-- 제목 -->
  <text x="600" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#212529">
    MR0300 - 마루 이력 조회 UI 설계
  </text>

  <!-- 메인 컨테이너 -->
  <rect x="50" y="70" width="1100" height="1300" fill="white" stroke="#dee2e6" stroke-width="2" rx="8"/>

  <!-- 헤더 영역 -->
  <rect x="70" y="90" width="1060" height="60" fill="#e9ecef" stroke="#adb5bd" stroke-width="1" rx="4"/>
  <text x="80" y="120" font-size="18" font-weight="bold" fill="#495057">MR0300 - 마루 이력 조회</text>
  <rect x="950" y="105" width="80" height="30" fill="#0d6efd" stroke="#0a58ca" stroke-width="1" rx="4" data-testid="btn_search"/>
  <text x="990" y="127" font-size="14" fill="white" text-anchor="middle">검색</text>
  <rect x="1040" y="105" width="80" height="30" fill="#6c757d" stroke="#5c636a" stroke-width="1" rx="4" data-testid="btn_reset"/>
  <text x="1080" y="127" font-size="14" fill="white" text-anchor="middle">초기화</text>

  <!-- 검색 조건 영역 -->
  <rect x="70" y="160" width="1060" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="80" y="185" font-size="16" font-weight="bold" fill="#212529">검색 조건</text>

  <text x="90" y="215" font-size="14" fill="#495057">마루 ID:</text>
  <rect x="160" y="200" width="250" height="30" fill="white" stroke="#ced4da" stroke-width="1" rx="4" data-testid="cmb_maruId"/>
  <text x="285" y="220" font-size="14" fill="#6c757d">DEPT_CODE_001 ▼</text>

  <text x="90" y="255" font-size="14" fill="#495057">조회 기간:</text>
  <rect x="180" y="240" width="150" height="30" fill="white" stroke="#ced4da" stroke-width="1" rx="4" data-testid="cal_fromDate"/>
  <text x="255" y="260" font-size="14" fill="#6c757d">2024-01-01</text>
  <text x="340" y="260" font-size="14" fill="#495057">~</text>
  <rect x="370" y="240" width="150" height="30" fill="white" stroke="#ced4da" stroke-width="1" rx="4" data-testid="cal_toDate"/>
  <text x="445" y="260" font-size="14" fill="#6c757d">2025-10-04</text>

  <!-- 이력 통계 영역 -->
  <rect x="70" y="290" width="1060" height="150" fill="#e7f5ff" stroke="#339af0" stroke-width="1" rx="4"/>
  <text x="80" y="315" font-size="16" font-weight="bold" fill="#1971c2">이력 통계</text>

  <text x="90" y="345" font-size="14" fill="#495057">총 버전: <tspan font-weight="bold">15개</tspan></text>
  <text x="250" y="345" font-size="14" fill="#495057">최초 생성: <tspan font-weight="bold">2025-01-01</tspan></text>
  <text x="450" y="345" font-size="14" fill="#495057">최종 수정: <tspan font-weight="bold">2025-09-15</tspan></text>

  <!-- 상태별 막대 그래프 -->
  <text x="90" y="380" font-size="12" fill="#495057">CREATED:</text>
  <rect x="180" y="365" width="200" height="20" fill="#339af0" rx="2"/>
  <text x="390" y="380" font-size="12" fill="#495057">(30일)</text>

  <text x="90" y="410" font-size="12" fill="#495057">INUSE:</text>
  <rect x="180" y="395" width="600" height="20" fill="#51cf66" rx="2"/>
  <text x="790" y="410" font-size="12" fill="#495057">(200일)</text>

  <!-- 이력 목록 그리드 -->
  <rect x="70" y="450" width="1060" height="340" fill="white" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="80" y="475" font-size="16" font-weight="bold" fill="#212529">이력 목록</text>

  <!-- 그리드 헤더 -->
  <rect x="90" y="490" width="40" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="110" y="512" font-size="12" fill="white" text-anchor="middle">☐</text>
  <rect x="130" y="490" width="80" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="170" y="512" font-size="12" fill="white" text-anchor="middle">버전</text>
  <rect x="210" y="490" width="250" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="335" y="512" font-size="12" fill="white" text-anchor="middle">마루명</text>
  <rect x="460" y="490" width="150" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="535" y="512" font-size="12" fill="white" text-anchor="middle">상태</text>
  <rect x="610" y="490" width="250" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="735" y="512" font-size="12" fill="white" text-anchor="middle">시작일시</text>
  <rect x="860" y="490" width="250" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="985" y="512" font-size="12" fill="white" text-anchor="middle">종료일시</text>

  <!-- 그리드 데이터 행 1 (선택됨) -->
  <rect x="90" y="525" width="1020" height="35" fill="#cfe2ff" stroke="#9ec5fe" stroke-width="1" data-testid="grid_row_1"/>
  <text x="110" y="547" font-size="12" fill="#212529" text-anchor="middle">☑</text>
  <text x="170" y="547" font-size="12" fill="#212529" text-anchor="middle">3</text>
  <text x="220" y="547" font-size="12" fill="#212529">부서코드(수정)</text>
  <text x="535" y="547" font-size="12" fill="#212529" text-anchor="middle">INUSE</text>
  <text x="620" y="547" font-size="12" fill="#212529">2025-09-15 10:00</text>
  <text x="870" y="547" font-size="12" fill="#212529">9999-12-31 23:59</text>

  <!-- 그리드 데이터 행 2 -->
  <rect x="90" y="560" width="1020" height="35" fill="white" stroke="#dee2e6" stroke-width="1" data-testid="grid_row_2"/>
  <text x="110" y="582" font-size="12" fill="#495057" text-anchor="middle">☐</text>
  <text x="170" y="582" font-size="12" fill="#495057" text-anchor="middle">2</text>
  <text x="220" y="582" font-size="12" fill="#495057">부서코드(변경)</text>
  <text x="535" y="582" font-size="12" fill="#495057" text-anchor="middle">INUSE</text>
  <text x="620" y="582" font-size="12" fill="#495057">2025-06-01 09:00</text>
  <text x="870" y="582" font-size="12" fill="#495057">2025-09-15 09:59</text>

  <!-- 그리드 데이터 행 3 -->
  <rect x="90" y="595" width="1020" height="35" fill="white" stroke="#dee2e6" stroke-width="1" data-testid="grid_row_3"/>
  <text x="110" y="617" font-size="12" fill="#495057" text-anchor="middle">☐</text>
  <text x="170" y="617" font-size="12" fill="#495057" text-anchor="middle">1</text>
  <text x="220" y="617" font-size="12" fill="#495057">부서코드(최초)</text>
  <text x="535" y="617" font-size="12" fill="#495057" text-anchor="middle">CREATED</text>
  <text x="620" y="617" font-size="12" fill="#495057">2025-01-01 08:00</text>
  <text x="870" y="617" font-size="12" fill="#495057">2025-06-01 08:59</text>

  <!-- 페이지네이션 -->
  <rect x="90" y="640" width="1020" height="40" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="110" y="665" font-size="14" fill="#495057">◀ 1 / 1 페이지 (총 3건) ▶</text>

  <!-- 타임라인 영역 -->
  <rect x="70" y="700" width="1060" height="100" fill="#f1f3f5" stroke="#868e96" stroke-width="1" rx="4"/>
  <text x="80" y="725" font-size="16" font-weight="bold" fill="#212529">타임라인 뷰</text>

  <!-- 타임라인 -->
  <line x1="100" y1="760" x2="1050" y2="760" stroke="#adb5bd" stroke-width="2"/>
  <circle cx="200" cy="760" r="8" fill="#339af0" stroke="#1971c2" stroke-width="2" data-testid="timeline_v1"/>
  <text x="200" y="785" font-size="12" fill="#495057" text-anchor="middle">v1(CREATED)</text>
  <circle cx="500" cy="760" r="8" fill="#51cf66" stroke="#37b24d" stroke-width="2" data-testid="timeline_v2"/>
  <text x="500" y="785" font-size="12" fill="#495057" text-anchor="middle">v2(INUSE)</text>
  <circle cx="800" cy="760" r="8" fill="#51cf66" stroke="#37b24d" stroke-width="2" data-testid="timeline_v3"/>
  <text x="800" y="785" font-size="12" fill="#495057" text-anchor="middle">v3(INUSE)</text>
  <text x="100" y="750" font-size="12" fill="#6c757d">2025-01-01</text>
  <text x="1000" y="750" font-size="12" fill="#6c757d">현재</text>

  <!-- 기능 버튼 영역 -->
  <rect x="70" y="810" width="1060" height="60" fill="white" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="80" y="835" font-size="16" font-weight="bold" fill="#212529">기능 버튼</text>
  <rect x="90" y="845" width="120" height="30" fill="#0d6efd" stroke="#0a58ca" stroke-width="1" rx="4" data-testid="btn_compare"/>
  <text x="150" y="867" font-size="14" fill="white" text-anchor="middle">버전 비교</text>
  <rect x="220" y="845" width="150" height="30" fill="#6c757d" stroke="#5c636a" stroke-width="1" rx="4" data-testid="btn_asOf"/>
  <text x="295" y="867" font-size="14" fill="white" text-anchor="middle">특정 시점 조회</text>
  <rect x="380" y="845" width="130" height="30" fill="#198754" stroke="#146c43" stroke-width="1" rx="4" data-testid="btn_excel"/>
  <text x="445" y="867" font-size="14" fill="white" text-anchor="middle">Excel 다운로드</text>

  <!-- 버전 비교 팝업 (예시) -->
  <rect x="700" y="900" width="450" height="450" fill="white" stroke="#0d6efd" stroke-width="3" rx="8" opacity="0.95"/>
  <rect x="700" y="900" width="450" height="50" fill="#0d6efd" stroke="#0a58ca" stroke-width="1" rx="8 8 0 0"/>
  <text x="925" y="930" font-size="18" font-weight="bold" fill="white" text-anchor="middle">버전 비교 팝업</text>

  <text x="720" y="975" font-size="14" fill="#495057">비교 대상: <tspan font-weight="bold">버전 1 ↔ 버전 3</tspan></text>

  <!-- 비교 결과 테이블 -->
  <rect x="720" y="1000" width="410" height="280" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="4"/>

  <!-- 테이블 헤더 -->
  <rect x="730" y="1010" width="130" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="795" y="1032" font-size="12" fill="white" text-anchor="middle">필드명</text>
  <rect x="860" y="1010" width="130" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="925" y="1032" font-size="12" fill="white" text-anchor="middle">이전 값</text>
  <rect x="990" y="1010" width="130" height="35" fill="#495057" stroke="#343a40" stroke-width="1"/>
  <text x="1055" y="1032" font-size="12" fill="white" text-anchor="middle">신규 값</text>

  <!-- 비교 데이터 행 1 (수정됨 - 주황색) -->
  <rect x="730" y="1045" width="390" height="35" fill="#ffe8cc" stroke="#ffb366" stroke-width="1"/>
  <text x="795" y="1067" font-size="12" fill="#212529" text-anchor="middle">MARU_NAME</text>
  <text x="925" y="1067" font-size="12" fill="#212529" text-anchor="middle">부서코드</text>
  <text x="1055" y="1067" font-size="12" fill="#212529" text-anchor="middle">부서코드(수정)</text>

  <!-- 비교 데이터 행 2 (수정됨 - 주황색) -->
  <rect x="730" y="1080" width="390" height="35" fill="#ffe8cc" stroke="#ffb366" stroke-width="1"/>
  <text x="795" y="1102" font-size="12" fill="#212529" text-anchor="middle">MARU_STATUS</text>
  <text x="925" y="1102" font-size="12" fill="#212529" text-anchor="middle">CREATED</text>
  <text x="1055" y="1102" font-size="12" fill="#212529" text-anchor="middle">INUSE</text>

  <!-- 팝업 닫기 버튼 -->
  <rect x="875" y="1310" width="100" height="30" fill="#6c757d" stroke="#5c636a" stroke-width="1" rx="4" data-testid="btn_popup_close"/>
  <text x="925" y="1332" font-size="14" fill="white" text-anchor="middle">닫기</text>

  <!-- 주석: 상호작용 포인트 -->
  <text x="50" y="1380" font-size="10" fill="#6c757d" font-style="italic">
    * 주요 상호작용 포인트: 검색 버튼, 그리드 행 선택, 버전 비교 버튼, 특정 시점 조회 버튼
  </text>
  <text x="50" y="1395" font-size="10" fill="#6c757d" font-style="italic">
    * 접근성: Tab 키로 모든 컨트롤 접근 가능, 명확한 포커스 표시
  </text>
</svg>
