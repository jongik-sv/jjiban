<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    CD0300 Backend API 아키텍처 - 코드 검증 프로세스
  </text>

  <!-- Frontend Layer -->
  <rect x="50" y="60" width="200" height="100" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="150" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">Frontend (Nexacro N)</text>
  <text x="150" y="105" font-size="12" text-anchor="middle" fill="#555">CD0300 화면</text>
  <text x="150" y="125" font-size="11" text-anchor="middle" fill="#777">검증 요청</text>
  <circle cx="250" cy="110" r="5" fill="#4CAF50" data-testid="frontend-trigger"/>
  <text x="260" y="115" font-size="10" fill="#4CAF50">클릭</text>

  <!-- HTTP Request Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <line x1="250" y1="110" x2="330" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="280" y="105" font-size="11" fill="#666">POST</text>
  <text x="260" y="130" font-size="10" fill="#999">/api/v1/maru-headers/{id}/validate-codes</text>

  <!-- API Gateway / Router Layer -->
  <rect x="350" y="60" width="200" height="100" fill="#FFF3E0" stroke="#F57C00" stroke-width="2" rx="5"/>
  <text x="450" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#F57C00">Express Router</text>
  <text x="450" y="105" font-size="12" text-anchor="middle" fill="#555">routes/codeBase.js</text>
  <text x="450" y="125" font-size="11" text-anchor="middle" fill="#777">입력 검증 (Joi)</text>

  <line x1="450" y1="160" x2="450" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Controller Layer -->
  <rect x="350" y="220" width="200" height="100" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="450" y="245" font-size="14" font-weight="bold" text-anchor="middle" fill="#7B1FA2">Controller</text>
  <text x="450" y="265" font-size="12" text-anchor="middle" fill="#555">codeBase.controller.js</text>
  <text x="450" y="285" font-size="11" text-anchor="middle" fill="#777">validateCodes()</text>

  <line x1="450" y1="320" x2="450" y2="370" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Service Layer -->
  <rect x="350" y="380" width="200" height="120" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="5"/>
  <text x="450" y="405" font-size="14" font-weight="bold" text-anchor="middle" fill="#388E3C">Service Layer</text>
  <text x="450" y="425" font-size="12" text-anchor="middle" fill="#555">codeBase.service.js</text>
  <text x="450" y="445" font-size="11" text-anchor="middle" fill="#777">validateCodeIntegrity()</text>
  <text x="450" y="465" font-size="11" text-anchor="middle" fill="#777">validateNormalType()</text>
  <text x="450" y="485" font-size="11" text-anchor="middle" fill="#777">validateRegExType()</text>

  <!-- Service to Database Arrows -->
  <line x1="350" y1="440" x2="230" y2="440" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="280" y="435" font-size="10" fill="#666">조회</text>

  <!-- Database Layer -->
  <rect x="50" y="380" width="180" height="220" fill="#FFEBEE" stroke="#C62828" stroke-width="2" rx="5"/>
  <text x="140" y="405" font-size="14" font-weight="bold" text-anchor="middle" fill="#C62828">Oracle Database</text>

  <!-- TB_MR_HEAD Table -->
  <rect x="70" y="420" width="140" height="50" fill="#FFF" stroke="#C62828" stroke-width="1" rx="3"/>
  <text x="140" y="435" font-size="11" font-weight="bold" text-anchor="middle" fill="#C62828">TB_MR_HEAD</text>
  <text x="140" y="450" font-size="9" text-anchor="middle" fill="#555">MARU_ID, VERSION</text>
  <text x="140" y="463" font-size="9" text-anchor="middle" fill="#555">MARU_STATUS, TYPE</text>

  <!-- TB_MR_CODE_CATE Table -->
  <rect x="70" y="480" width="140" height="50" fill="#FFF" stroke="#C62828" stroke-width="1" rx="3"/>
  <text x="140" y="495" font-size="11" font-weight="bold" text-anchor="middle" fill="#C62828">TB_MR_CODE_CATE</text>
  <text x="140" y="510" font-size="9" text-anchor="middle" fill="#555">CATEGORY_ID</text>
  <text x="140" y="523" font-size="9" text-anchor="middle" fill="#555">CODE_TYPE, DEFINITION</text>

  <!-- TB_MR_CODE_BASE Table -->
  <rect x="70" y="540" width="140" height="50" fill="#FFF" stroke="#C62828" stroke-width="1" rx="3"/>
  <text x="140" y="555" font-size="11" font-weight="bold" text-anchor="middle" fill="#C62828">TB_MR_CODE_BASE</text>
  <text x="140" y="570" font-size="9" text-anchor="middle" fill="#555">CODE, CODE_NAME</text>
  <text x="140" y="583" font-size="9" text-anchor="middle" fill="#555">SORT_ORDER</text>

  <!-- Validation Logic Box -->
  <rect x="620" y="220" width="340" height="280" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="5"/>
  <text x="790" y="245" font-size="14" font-weight="bold" text-anchor="middle" fill="#F9A825">검증 로직 (Validator)</text>

  <!-- Normal Type Validation -->
  <rect x="640" y="260" width="140" height="80" fill="#FFF" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="710" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Normal 타입 검증</text>
  <text x="710" y="298" font-size="10" text-anchor="middle" fill="#555">1. 콤마 구분 파싱</text>
  <text x="710" y="314" font-size="10" text-anchor="middle" fill="#555">2. 허용값 배열 비교</text>
  <text x="710" y="330" font-size="10" text-anchor="middle" fill="#777">예: "1,2,3,4,5"</text>

  <!-- RegEx Type Validation -->
  <rect x="800" y="260" width="140" height="80" fill="#FFF" stroke="#2196F3" stroke-width="1" rx="3"/>
  <text x="870" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="#2196F3">RegEx 타입 검증</text>
  <text x="870" y="298" font-size="10" text-anchor="middle" fill="#555">1. 정규식 컴파일</text>
  <text x="870" y="314" font-size="10" text-anchor="middle" fill="#555">2. 패턴 매칭 테스트</text>
  <text x="870" y="330" font-size="10" text-anchor="middle" fill="#777">예: ^[A-Z]{2}[0-9]{4}$</text>

  <!-- Duplicate Check -->
  <rect x="640" y="360" width="300" height="60" fill="#FFF" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="790" y="380" font-size="12" font-weight="bold" text-anchor="middle" fill="#E91E63">중복 코드 검증</text>
  <text x="790" y="398" font-size="10" text-anchor="middle" fill="#555">GROUP BY CODE HAVING COUNT(*) > 1</text>
  <text x="790" y="414" font-size="10" text-anchor="middle" fill="#777">동일 MARU_ID 내 중복 검출</text>

  <!-- Validation Result -->
  <rect x="640" y="440" width="300" height="50" fill="#FFF" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="790" y="460" font-size="12" font-weight="bold" text-anchor="middle" fill="#9C27B0">검증 결과 생성</text>
  <text x="790" y="478" font-size="10" text-anchor="middle" fill="#555">VALID / INVALID + ERROR_TYPE + MESSAGE</text>

  <!-- Service to Validation Logic Arrow -->
  <line x1="550" y1="440" x2="620" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="395" font-size="10" fill="#666">검증 실행</text>

  <!-- Response Flow -->
  <line x1="450" y1="380" x2="450" y2="350" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="460" y="365" font-size="10" fill="#666">결과 반환</text>

  <!-- XML Response Box -->
  <rect x="350" y="550" width="200" height="100" fill="#E1F5FE" stroke="#0277BD" stroke-width="2" rx="5"/>
  <text x="450" y="575" font-size="14" font-weight="bold" text-anchor="middle" fill="#0277BD">XML Builder</text>
  <text x="450" y="595" font-size="12" text-anchor="middle" fill="#555">Nexacro Dataset XML</text>
  <text x="450" y="615" font-size="11" text-anchor="middle" fill="#777">ErrorCode, Rows</text>
  <text x="450" y="635" font-size="11" text-anchor="middle" fill="#777">ColumnInfo</text>

  <line x1="450" y1="500" x2="450" y2="550" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Response to Frontend -->
  <line x1="350" y1="600" x2="250" y2="600" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="600" x2="250" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="260" y="400" font-size="11" fill="#666">HTTP 200 + XML</text>

  <!-- Legend -->
  <rect x="50" y="700" width="900" height="80" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
  <text x="500" y="720" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">범례 (Legend)</text>

  <rect x="70" y="730" width="40" height="20" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="120" y="744" font-size="11" fill="#555">Frontend</text>

  <rect x="200" y="730" width="40" height="20" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="250" y="744" font-size="11" fill="#555">Router</text>

  <rect x="330" y="730" width="40" height="20" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="380" y="744" font-size="11" fill="#555">Controller</text>

  <rect x="460" y="730" width="40" height="20" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="510" y="744" font-size="11" fill="#555">Service</text>

  <rect x="590" y="730" width="40" height="20" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="640" y="744" font-size="11" fill="#555">Database</text>

  <rect x="720" y="730" width="40" height="20" fill="#FFFDE7" stroke="#F9A825" stroke-width="1"/>
  <text x="770" y="744" font-size="11" fill="#555">Validation Logic</text>

  <rect x="870" y="730" width="40" height="20" fill="#E1F5FE" stroke="#0277BD" stroke-width="1"/>
  <text x="920" y="744" font-size="11" fill="#555">XML Response</text>

  <!-- Footer -->
  <text x="500" y="780" font-size="10" text-anchor="middle" fill="#999">
    Task 8.1 - CD0300 Backend API Architecture (2025-10-05)
  </text>
</svg>
