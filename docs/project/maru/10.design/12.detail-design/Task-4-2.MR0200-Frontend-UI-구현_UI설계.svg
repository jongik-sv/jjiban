<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <!-- 배경 -->
  <rect width="1200" height="900" fill="#f5f5f5"/>

  <!-- 제목 영역 -->
  <rect x="20" y="20" width="1160" height="50" fill="#2c3e50" rx="5"/>
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="20" fill="white" font-weight="bold">MR0200 - 마루 현황 조회</text>
  <rect x="1020" y="30" width="70" height="30" fill="#3498db" rx="3" data-testid="btn-refresh"/>
  <text x="1035" y="51" font-family="Arial, sans-serif" font-size="12" fill="white">새로고침</text>
  <rect x="1100" y="30" width="60" height="30" fill="#95a5a6" rx="3" data-testid="btn-close"/>
  <text x="1120" y="51" font-family="Arial, sans-serif" font-size="12" fill="white">닫기</text>

  <!-- 현황 요약 영역 -->
  <rect x="20" y="90" width="1160" height="120" fill="white" rx="5" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="110" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">현황 요약</text>

  <!-- 통계 카드들 -->
  <g data-testid="card-total">
    <rect x="40" y="125" width="140" height="70" fill="#ecf0f1" rx="5" stroke="#bdc3c7" stroke-width="1"/>
    <text x="60" y="145" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">전체</text>
    <text x="70" y="175" font-family="Arial, sans-serif" font-size="24" fill="#2c3e50" font-weight="bold">150</text>
    <text x="125" y="175" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">건</text>
  </g>

  <g data-testid="card-created">
    <rect x="200" y="125" width="140" height="70" fill="#e8f8f5" rx="5" stroke="#a3e4d7" stroke-width="1"/>
    <text x="220" y="145" font-family="Arial, sans-serif" font-size="12" fill="#16a085">CREATED</text>
    <text x="235" y="175" font-family="Arial, sans-serif" font-size="24" fill="#16a085" font-weight="bold">25</text>
    <text x="280" y="175" font-family="Arial, sans-serif" font-size="14" fill="#16a085">건</text>
  </g>

  <g data-testid="card-inuse">
    <rect x="360" y="125" width="140" height="70" fill="#ebf5fb" rx="5" stroke="#aed6f1" stroke-width="1"/>
    <text x="385" y="145" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">INUSE</text>
    <text x="395" y="175" font-family="Arial, sans-serif" font-size="24" fill="#2980b9" font-weight="bold">100</text>
    <text x="445" y="175" font-family="Arial, sans-serif" font-size="14" fill="#2980b9">건</text>
  </g>

  <g data-testid="card-deprecated">
    <rect x="520" y="125" width="140" height="70" fill="#fadbd8" rx="5" stroke="#f5b7b1" stroke-width="1"/>
    <text x="530" y="145" font-family="Arial, sans-serif" font-size="12" fill="#c0392b">DEPRECATED</text>
    <text x="560" y="175" font-family="Arial, sans-serif" font-size="24" fill="#c0392b" font-weight="bold">25</text>
    <text x="595" y="175" font-family="Arial, sans-serif" font-size="14" fill="#c0392b">건</text>
  </g>

  <g data-testid="card-code">
    <rect x="700" y="125" width="140" height="70" fill="#fef5e7" rx="5" stroke="#f9e79f" stroke-width="1"/>
    <text x="730" y="145" font-family="Arial, sans-serif" font-size="12" fill="#d68910">CODE</text>
    <text x="745" y="175" font-family="Arial, sans-serif" font-size="24" fill="#d68910" font-weight="bold">90</text>
    <text x="785" y="175" font-family="Arial, sans-serif" font-size="14" fill="#d68910">건</text>
  </g>

  <g data-testid="card-rule">
    <rect x="860" y="125" width="140" height="70" fill="#f4ecf7" rx="5" stroke="#d7bde2" stroke-width="1"/>
    <text x="895" y="145" font-family="Arial, sans-serif" font-size="12" fill="#7d3c98">RULE</text>
    <text x="905" y="175" font-family="Arial, sans-serif" font-size="24" fill="#7d3c98" font-weight="bold">60</text>
    <text x="945" y="175" font-family="Arial, sans-serif" font-size="14" fill="#7d3c98">건</text>
  </g>

  <g data-testid="card-cache">
    <rect x="1020" y="125" width="140" height="70" fill="#eaeded" rx="5" stroke="#cacfd2" stroke-width="1"/>
    <text x="1035" y="145" font-family="Arial, sans-serif" font-size="11" fill="#566573">캐시: HIT (5분 전)</text>
    <rect x="1035" y="155" width="105" height="25" fill="#3498db" rx="3" data-testid="btn-clear-cache"/>
    <text x="1045" y="172" font-family="Arial, sans-serif" font-size="11" fill="white">캐시 초기화</text>
  </g>

  <!-- 검색 조건 영역 -->
  <rect x="20" y="230" width="1160" height="110" fill="white" rx="5" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="250" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">검색 조건</text>

  <!-- 첫 번째 행 -->
  <text x="40" y="278" font-family="Arial, sans-serif" font-size="12" fill="#555">마루타입:</text>
  <rect x="110" y="265" width="120" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-type"/>
  <text x="120" y="282" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">전체 ▼</text>

  <text x="260" y="278" font-family="Arial, sans-serif" font-size="12" fill="#555">상태:</text>
  <rect x="300" y="265" width="120" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-status"/>
  <text x="310" y="282" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">전체 ▼</text>

  <text x="450" y="278" font-family="Arial, sans-serif" font-size="12" fill="#555">우선순위:</text>
  <rect x="530" y="265" width="120" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-priority"/>
  <text x="540" y="282" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">전체 ▼</text>

  <!-- 두 번째 행 -->
  <text x="40" y="313" font-family="Arial, sans-serif" font-size="12" fill="#555">마루명:</text>
  <rect x="100" y="300" width="200" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="edit-search"/>
  <line x1="295" y1="300" x2="295" y2="325" stroke="#bdc3c7" stroke-width="1"/>

  <text x="330" y="313" font-family="Arial, sans-serif" font-size="12" fill="#555">생성일:</text>
  <rect x="385" y="300" width="110" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="calendar-from"/>
  <text x="395" y="317" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">2025-01-01</text>

  <text x="505" y="313" font-family="Arial, sans-serif" font-size="12" fill="#555">~</text>

  <rect x="520" y="300" width="110" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="calendar-to"/>
  <text x="530" y="317" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">2025-12-31</text>

  <!-- 세 번째 행 -->
  <text x="40" y="313" font-family="Arial, sans-serif" font-size="12" fill="#555">정렬:</text>
  <rect x="80" y="300" width="130" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-sortby"/>
  <text x="90" y="317" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">생성일 ▼</text>

  <rect x="220" y="300" width="130" height="25" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-sortorder"/>
  <text x="230" y="317" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">내림차순 ▼</text>

  <!-- 버튼 영역 (오른쪽 정렬) -->
  <rect x="1000" y="300" width="70" height="30" fill="#27ae60" rx="3" data-testid="btn-search"/>
  <text x="1020" y="321" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">검색</text>

  <rect x="1080" y="300" width="70" height="30" fill="#95a5a6" rx="3" data-testid="btn-reset"/>
  <text x="1093" y="321" font-family="Arial, sans-serif" font-size="13" fill="white">초기화</text>

  <!-- 마루 목록 그리드 -->
  <rect x="20" y="360" width="1160" height="440" fill="white" rx="5" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="380" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">마루 목록 (총 150건)</text>

  <!-- 그리드 헤더 -->
  <g data-testid="grid-header">
    <rect x="40" y="395" width="1120" height="35" fill="#34495e"/>
    <text x="60" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">No</text>
    <text x="150" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">마루ID</text>
    <text x="280" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">마루명</text>
    <text x="520" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">상태</text>
    <text x="650" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">타입</text>
    <text x="760" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">우선순위</text>
    <text x="900" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">생성일</text>
    <text x="1040" y="417" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">종료일</text>
  </g>

  <!-- 그리드 행 (샘플 데이터) -->
  <g data-testid="grid-row-1">
    <rect x="40" y="430" width="1120" height="30" fill="#ecf0f1"/>
    <text x="65" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">1</text>
    <text x="150" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CODE01</text>
    <text x="280" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">부서코드</text>
    <text x="520" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">INUSE</text>
    <text x="650" y="450" font-family="Arial, sans-serif" font-size="11" fill="#d68910">CODE</text>
    <text x="785" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Y</text>
    <text x="900" y="450" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20250101</text>
    <text x="1040" y="450" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">99991231</text>
  </g>

  <g data-testid="grid-row-2">
    <rect x="40" y="460" width="1120" height="30" fill="white"/>
    <text x="65" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">2</text>
    <text x="150" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">RULE01</text>
    <text x="280" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">직급룰</text>
    <text x="520" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">INUSE</text>
    <text x="650" y="480" font-family="Arial, sans-serif" font-size="11" fill="#7d3c98">RULE</text>
    <text x="785" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">N</text>
    <text x="900" y="480" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20250102</text>
    <text x="1040" y="480" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">99991231</text>
  </g>

  <g data-testid="grid-row-3">
    <rect x="40" y="490" width="1120" height="30" fill="#ecf0f1"/>
    <text x="65" y="510" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">3</text>
    <text x="150" y="510" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CODE02</text>
    <text x="280" y="510" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">직책코드</text>
    <text x="520" y="510" font-family="Arial, sans-serif" font-size="11" fill="#16a085">CREATED</text>
    <text x="650" y="510" font-family="Arial, sans-serif" font-size="11" fill="#d68910">CODE</text>
    <text x="785" y="510" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Y</text>
    <text x="900" y="510" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20250103</text>
    <text x="1040" y="510" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">99991231</text>
  </g>

  <!-- 추가 행 표시 (말줄임) -->
  <text x="560" y="560" font-family="Arial, sans-serif" font-size="14" fill="#95a5a6">...</text>

  <g data-testid="grid-row-20">
    <rect x="40" y="730" width="1120" height="30" fill="white"/>
    <text x="60" y="750" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">20</text>
    <text x="150" y="750" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CODE20</text>
    <text x="280" y="750" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">위치코드</text>
    <text x="520" y="750" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">INUSE</text>
    <text x="650" y="750" font-family="Arial, sans-serif" font-size="11" fill="#d68910">CODE</text>
    <text x="785" y="750" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">N</text>
    <text x="900" y="750" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20250120</text>
    <text x="1040" y="750" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">99991231</text>
  </g>

  <!-- 페이징 네비게이션 -->
  <rect x="20" y="820" width="1160" height="60" fill="white" rx="5" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="840" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">페이징</text>

  <g data-testid="pagination">
    <rect x="400" y="845" width="80" height="30" fill="#3498db" rx="3" data-testid="btn-prev"/>
    <text x="415" y="866" font-family="Arial, sans-serif" font-size="12" fill="white">◀ 이전</text>

    <text x="510" y="866" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">1 / 8 페이지</text>

    <rect x="640" y="845" width="80" height="30" fill="#3498db" rx="3" data-testid="btn-next"/>
    <text x="655" y="866" font-family="Arial, sans-serif" font-size="12" fill="white">다음 ▶</text>

    <text x="750" y="866" font-family="Arial, sans-serif" font-size="12" fill="#555">페이지당:</text>
    <rect x="830" y="845" width="70" height="30" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" data-testid="combo-pagesize"/>
    <text x="850" y="866" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">20 ▼</text>
  </g>

  <!-- 상호작용 포인트 표시 (테스트 자동화를 위한 표시) -->
  <g opacity="0.3">
    <circle cx="1055" cy="45" r="8" fill="red" data-interaction="click"/>
    <circle cx="1130" cy="45" r="8" fill="red" data-interaction="click"/>
    <circle cx="1087" cy="168" r="8" fill="red" data-interaction="click"/>
    <circle cx="1035" cy="315" r="8" fill="red" data-interaction="click"/>
    <circle cx="1115" cy="315" r="8" fill="red" data-interaction="click"/>
    <circle cx="440" cy="860" r="8" fill="red" data-interaction="click"/>
    <circle cx="680" cy="860" r="8" fill="red" data-interaction="click"/>
  </g>

  <!-- 접근성 정보 (숨김 처리) -->
  <defs>
    <metadata>
      <accessibility>
        <focus-order>combo-type, combo-status, combo-priority, edit-search, calendar-from, calendar-to, combo-sortby, combo-sortorder, btn-search, btn-reset, grid-header, grid-row-1, btn-prev, btn-next, combo-pagesize</focus-order>
        <aria-labels>
          <label for="combo-type">마루 타입 선택</label>
          <label for="combo-status">상태 선택</label>
          <label for="btn-search">검색 실행</label>
        </aria-labels>
      </accessibility>
    </metadata>
  </defs>
</svg>
