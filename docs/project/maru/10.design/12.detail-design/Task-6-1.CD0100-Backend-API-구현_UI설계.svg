<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="700" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    CD0100 Backend API - Swagger UI 테스트 인터페이스
  </text>

  <!-- Main Container -->
  <rect x="50" y="60" width="800" height="620" rx="8" fill="white" stroke="#ddd" stroke-width="2"/>

  <!-- Header Bar -->
  <rect x="50" y="60" width="800" height="50" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="70" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    Swagger UI - MARU API Documentation
  </text>

  <!-- URL Display -->
  <rect x="70" y="130" width="740" height="40" rx="4" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="155" font-family="Monaco, Courier New, monospace" font-size="14" fill="#555">
    http://localhost:3000/api-docs
  </text>

  <!-- Section Title -->
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">
    Code Category Management APIs
  </text>

  <!-- API CC001 -->
  <g data-testid="api-cc001">
    <rect x="70" y="220" width="740" height="60" rx="4" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
    <text x="90" y="245" font-family="Monaco, Courier New, monospace" font-size="14" font-weight="bold" fill="#1976D2">
      ▼ CC001 GET /api/v1/maru-headers/{maruId}/categories
    </text>
    <text x="110" y="265" font-family="Arial, sans-serif" font-size="12" fill="#555">
      코드 카테고리 목록 조회
    </text>
    <rect x="650" y="230" width="120" height="30" rx="4" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
    <text x="710" y="251" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
      Try it out
    </text>
  </g>

  <!-- API CC002 -->
  <g data-testid="api-cc002">
    <rect x="70" y="295" width="740" height="60" rx="4" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
    <text x="90" y="320" font-family="Monaco, Courier New, monospace" font-size="14" font-weight="bold" fill="#F57C00">
      ▼ CC002 GET /api/v1/maru-headers/{maruId}/categories/{categoryId}
    </text>
    <text x="110" y="340" font-family="Arial, sans-serif" font-size="12" fill="#555">
      코드 카테고리 상세 조회
    </text>
    <rect x="650" y="305" width="120" height="30" rx="4" fill="#FF9800" stroke="#F57C00" stroke-width="1"/>
    <text x="710" y="326" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
      Try it out
    </text>
  </g>

  <!-- API CC003 -->
  <g data-testid="api-cc003">
    <rect x="70" y="370" width="740" height="60" rx="4" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="395" font-family="Monaco, Courier New, monospace" font-size="14" font-weight="bold" fill="#2E7D32">
      ▼ CC003 POST /api/v1/maru-headers/{maruId}/categories
    </text>
    <text x="110" y="415" font-family="Arial, sans-serif" font-size="12" fill="#555">
      코드 카테고리 생성
    </text>
    <rect x="650" y="380" width="120" height="30" rx="4" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
    <text x="710" y="401" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
      Try it out
    </text>
  </g>

  <!-- API CC004 -->
  <g data-testid="api-cc004">
    <rect x="70" y="445" width="740" height="60" rx="4" fill="#fff9c4" stroke="#FFC107" stroke-width="2"/>
    <text x="90" y="470" font-family="Monaco, Courier New, monospace" font-size="14" font-weight="bold" fill="#F9A825">
      ▼ CC004 PUT /api/v1/maru-headers/{maruId}/categories/{categoryId}
    </text>
    <text x="110" y="490" font-family="Arial, sans-serif" font-size="12" fill="#555">
      코드 카테고리 수정
    </text>
    <rect x="650" y="455" width="120" height="30" rx="4" fill="#FFC107" stroke="#F9A825" stroke-width="1"/>
    <text x="710" y="476" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
      Try it out
    </text>
  </g>

  <!-- API CC005 -->
  <g data-testid="api-cc005">
    <rect x="70" y="520" width="740" height="60" rx="4" fill="#ffebee" stroke="#F44336" stroke-width="2"/>
    <text x="90" y="545" font-family="Monaco, Courier New, monospace" font-size="14" font-weight="bold" fill="#C62828">
      ▼ CC005 DELETE /api/v1/maru-headers/{maruId}/categories/{categoryId}
    </text>
    <text x="110" y="565" font-family="Arial, sans-serif" font-size="12" fill="#555">
      코드 카테고리 삭제
    </text>
    <rect x="650" y="530" width="120" height="30" rx="4" fill="#F44336" stroke="#C62828" stroke-width="1"/>
    <text x="710" y="551" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
      Try it out
    </text>
  </g>

  <!-- Footer Info -->
  <rect x="70" y="600" width="740" height="60" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="625" font-family="Arial, sans-serif" font-size="12" fill="#666">
    📋 Response Format: Nexacro Dataset XML
  </text>
  <text x="90" y="645" font-family="Arial, sans-serif" font-size="12" fill="#666">
    🔗 Base URL: http://localhost:3000/api/v1
  </text>

  <!-- Legend -->
  <g>
    <text x="450" y="690" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">
      [테스트 인터페이스 개념도 - 실제 UI는 Swagger UI 자동 생성]
    </text>
  </g>

  <!-- Interaction Points (Invisible for test automation) -->
  <circle cx="710" cy="245" r="15" fill="transparent" data-testid="btn-try-cc001"/>
  <circle cx="710" cy="320" r="15" fill="transparent" data-testid="btn-try-cc002"/>
  <circle cx="710" cy="395" r="15" fill="transparent" data-testid="btn-try-cc003"/>
  <circle cx="710" cy="470" r="15" fill="transparent" data-testid="btn-try-cc004"/>
  <circle cx="710" cy="545" r="15" fill="transparent" data-testid="btn-try-cc005"/>
</svg>
