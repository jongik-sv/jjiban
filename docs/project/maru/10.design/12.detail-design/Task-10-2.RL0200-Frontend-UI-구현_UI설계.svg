<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" style="background-color: #f5f5f5;">
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    RL0200 - 룰레코드관리 화면 UI 설계
  </text>

  <!-- Main Container -->
  <rect x="50" y="60" width="1100" height="800" fill="white" stroke="#ccc" stroke-width="2" rx="5"/>

  <!-- Search Area -->
  <rect x="70" y="80" width="1060" height="60" fill="#e8f4f8" stroke="#0078d4" stroke-width="1" rx="3"/>
  <text x="90" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">[검색조건]</text>
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="14" fill="#555">마루선택:</text>
  <rect x="290" y="95" width="300" height="30" fill="white" stroke="#999" stroke-width="1" rx="3" data-testid="cbo-maru-id"/>
  <text x="300" y="115" font-family="Arial, sans-serif" font-size="13" fill="#333">RULE_001 - 급여계산룰</text>
  <polygon points="580,105 575,100 575,110" fill="#666"/>

  <!-- Button Area -->
  <rect x="70" y="160" width="1060" height="50" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <rect x="90" y="172" width="60" height="26" fill="#0078d4" stroke="#0078d4" stroke-width="1" rx="3" data-testid="btn-new"/>
  <text x="120" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">신규</text>

  <rect x="165" y="172" width="60" height="26" fill="#0078d4" stroke="#0078d4" stroke-width="1" rx="3" data-testid="btn-edit"/>
  <text x="195" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">수정</text>

  <rect x="240" y="172" width="60" height="26" fill="#d13438" stroke="#d13438" stroke-width="1" rx="3" data-testid="btn-delete"/>
  <text x="270" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">삭제</text>

  <rect x="315" y="172" width="60" height="26" fill="#107c10" stroke="#107c10" stroke-width="1" rx="3" data-testid="btn-save"/>
  <text x="345" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">저장</text>

  <rect x="390" y="172" width="60" height="26" fill="#666" stroke="#666" stroke-width="1" rx="3" data-testid="btn-cancel"/>
  <text x="420" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">취소</text>

  <text x="1050" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">총 5건</text>

  <!-- Grid Area -->
  <rect x="70" y="230" width="1060" height="280" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Grid Header -->
  <rect x="70" y="230" width="1060" height="35" fill="#0078d4" stroke="#0078d4" stroke-width="1"/>
  <text x="90" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">우선순위</text>
  <text x="180" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">설명</text>
  <text x="380" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">조건1 (OP_1)</text>
  <text x="600" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">조건2 (OP_2)</text>
  <text x="820" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">결과1 (RSLT_1)</text>
  <text x="1000" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">결과2</text>

  <!-- Grid Sub-Header -->
  <rect x="70" y="265" width="1060" height="25" fill="#e8f4f8" stroke="#ccc" stroke-width="1"/>
  <text x="395" y="282" font-family="Arial, sans-serif" font-size="11" fill="#555">연산자 | 값1 | 값2</text>
  <text x="615" y="282" font-family="Arial, sans-serif" font-size="11" fill="#555">연산자 | 값1 | 값2</text>

  <!-- Grid Rows -->
  <rect x="70" y="290" width="1060" height="40" fill="#fff" stroke="#ddd" stroke-width="1" data-testid="grid-row-1"/>
  <text x="110" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">1</text>
  <text x="180" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">임원급여</text>
  <text x="395" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">=</text>
  <text x="430" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">임원</text>
  <text x="615" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">>=</text>
  <text x="650" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">10</text>
  <text x="820" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">급여*2.5</text>
  <text x="1000" y="313" font-family="Arial, sans-serif" font-size="12" fill="#333">Y</text>

  <rect x="70" y="330" width="1060" height="40" fill="#f9f9f9" stroke="#ddd" stroke-width="1" data-testid="grid-row-2"/>
  <text x="110" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">2</text>
  <text x="180" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">관리자급여</text>
  <text x="395" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">=</text>
  <text x="430" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">관리</text>
  <text x="615" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">>=</text>
  <text x="650" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">5</text>
  <text x="820" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">급여*2.0</text>
  <text x="1000" y="353" font-family="Arial, sans-serif" font-size="12" fill="#333">Y</text>

  <rect x="70" y="370" width="1060" height="40" fill="#fff" stroke="#ddd" stroke-width="1" data-testid="grid-row-3"/>
  <text x="110" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">3</text>
  <text x="180" y="393" font-family="Arial, sans-serif" font-size="12" fill="#333">일반직급여</text>
  <text x="395" y="393" font-family="Arial, sans-serif" font-size="12" fill="#333">=</text>
  <text x="430" y="393" font-family="Arial, sans-serif" font-size="12" fill="#333">일반</text>
  <text x="820" y="393" font-family="Arial, sans-serif" font-size="12" fill="#333">급여*1.5</text>
  <text x="1000" y="393" font-family="Arial, sans-serif" font-size="12" fill="#333">N</text>

  <!-- Drag & Drop Indicator -->
  <text x="90" y="485" font-family="Arial, sans-serif" font-size="11" fill="#0078d4">↕ 드래그하여 우선순위 변경</text>

  <!-- Detail Edit Area -->
  <rect x="70" y="530" width="1060" height="300" fill="#f9f9f9" stroke="#ccc" stroke-width="1" rx="3"/>

  <!-- Detail Title -->
  <text x="90" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">[룰 레코드 상세 편집]</text>

  <!-- Basic Info Section -->
  <rect x="90" y="570" width="1020" height="60" fill="white" stroke="#ddd" stroke-width="1" rx="3"/>
  <text x="110" y="595" font-family="Arial, sans-serif" font-size="12" fill="#555">[기본 정보]</text>
  <text x="110" y="615" font-family="Arial, sans-serif" font-size="12" fill="#333">우선순위:</text>
  <rect x="190" y="602" width="60" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-priority"/>
  <text x="200" y="617" font-family="Arial, sans-serif" font-size="12" fill="#333">1</text>

  <text x="280" y="615" font-family="Arial, sans-serif" font-size="12" fill="#333">설명:</text>
  <rect x="330" y="602" width="400" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-description"/>
  <text x="340" y="617" font-family="Arial, sans-serif" font-size="12" fill="#333">임원 급여 계산 룰</text>

  <!-- Conditions Section -->
  <rect x="90" y="650" width="500" height="140" fill="white" stroke="#0078d4" stroke-width="1" rx="3"/>
  <text x="110" y="675" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0078d4">[조건 (Conditions)]</text>

  <text x="110" y="700" font-family="Arial, sans-serif" font-size="12" fill="#333">OP_1:</text>
  <rect x="150" y="687" width="60" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="cbo-op1"/>
  <text x="160" y="702" font-family="Arial, sans-serif" font-size="12" fill="#333">=</text>
  <rect x="220" y="687" width="80" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprl1"/>
  <text x="230" y="702" font-family="Arial, sans-serif" font-size="12" fill="#333">임원</text>
  <rect x="310" y="687" width="80" height="22" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprr1"/>

  <text x="110" y="730" font-family="Arial, sans-serif" font-size="12" fill="#333">OP_2:</text>
  <rect x="150" y="717" width="60" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="cbo-op2"/>
  <text x="160" y="732" font-family="Arial, sans-serif" font-size="12" fill="#333">>=</text>
  <rect x="220" y="717" width="80" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprl2"/>
  <text x="230" y="732" font-family="Arial, sans-serif" font-size="12" fill="#333">10</text>
  <rect x="310" y="717" width="80" height="22" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprr2"/>

  <text x="110" y="760" font-family="Arial, sans-serif" font-size="12" fill="#333">OP_3:</text>
  <rect x="150" y="747" width="60" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="cbo-op3"/>
  <rect x="220" y="747" width="80" height="22" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprl3"/>
  <rect x="310" y="747" width="80" height="22" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="2" data-testid="txt-oprr3"/>

  <!-- Results Section -->
  <rect x="610" y="650" width="500" height="140" fill="white" stroke="#107c10" stroke-width="1" rx="3"/>
  <text x="630" y="675" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#107c10">[결과 (Results)]</text>

  <text x="630" y="700" font-family="Arial, sans-serif" font-size="12" fill="#333">RSLT_1:</text>
  <rect x="700" y="687" width="350" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-rslt1"/>
  <text x="710" y="702" font-family="Arial, sans-serif" font-size="12" fill="#333">급여 * 2.5</text>

  <text x="630" y="730" font-family="Arial, sans-serif" font-size="12" fill="#333">RSLT_2:</text>
  <rect x="700" y="717" width="350" height="22" fill="white" stroke="#999" stroke-width="1" rx="2" data-testid="txt-rslt2"/>
  <text x="710" y="732" font-family="Arial, sans-serif" font-size="12" fill="#333">Y</text>

  <text x="630" y="760" font-family="Arial, sans-serif" font-size="12" fill="#333">RSLT_3:</text>
  <rect x="700" y="747" width="350" height="22" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="2" data-testid="txt-rslt3"/>

  <!-- Action Buttons -->
  <rect x="950" y="805" width="70" height="30" fill="#0078d4" stroke="#0078d4" stroke-width="1" rx="3" data-testid="btn-apply"/>
  <text x="985" y="825" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">적용</text>

  <rect x="1035" y="805" width="70" height="30" fill="#666" stroke="#666" stroke-width="1" rx="3" data-testid="btn-cancel-detail"/>
  <text x="1070" y="825" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">취소</text>

  <!-- Interaction Indicators -->
  <circle cx="120" cy="300" r="8" fill="#ff6b6b" opacity="0.7"/>
  <text x="120" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">1</text>

  <circle cx="345" cy="185" r="8" fill="#ff6b6b" opacity="0.7"/>
  <text x="345" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">2</text>

  <circle cx="985" cy="820" r="8" fill="#ff6b6b" opacity="0.7"/>
  <text x="985" y="825" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">3</text>

  <!-- Legend -->
  <text x="70" y="870" font-family="Arial, sans-serif" font-size="11" fill="#666">상호작용 포인트:</text>
  <circle cx="180" cy="866" r="6" fill="#ff6b6b" opacity="0.7"/>
  <text x="190" y="870" font-family="Arial, sans-serif" font-size="10" fill="#666">① 그리드 행 선택 → 상세 편집</text>
  <circle cx="380" cy="866" r="6" fill="#ff6b6b" opacity="0.7"/>
  <text x="390" y="870" font-family="Arial, sans-serif" font-size="10" fill="#666">② 버튼 클릭 → CRUD 기능</text>
  <circle cx="580" cy="866" r="6" fill="#ff6b6b" opacity="0.7"/>
  <text x="590" y="870" font-family="Arial, sans-serif" font-size="10" fill="#666">③ 적용/취소 → 저장/복원</text>
</svg>
