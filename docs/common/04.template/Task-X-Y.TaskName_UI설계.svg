<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UI Layout Concept">
  <!-- Header -->
  <rect x="20" y="20" width="1160" height="80" rx="8" fill="#f5f5f5" stroke="#bbb"/>
  <text x="40" y="70" font-size="20">Header: Global Search | User Menu | Notifications</text>

  <!-- Body -->
  <rect x="20" y="120" width="1160" height="600" rx="8" fill="#ffffff" stroke="#ddd"/>

  <!-- Sidebar -->
  <rect x="40" y="140" width="260" height="560" rx="8" fill="#fafafa" stroke="#ccc"/>
  <text x="60" y="180" font-size="18">Sidebar</text>
  <text x="60" y="210" font-size="14">- Menu Tree</text>
  <text x="60" y="235" font-size="14">- Favorites</text>

  <!-- Content -->
  <rect x="320" y="140" width="840" height="560" rx="8" fill="#fff" stroke="#ccc"/>

  <!-- Tabs -->
  <rect x="340" y="160" width="800" height="50" rx="6" fill="#f7f7f7" stroke="#bbb"/>
  <text x="360" y="192" font-size="14">[Tab1] [Tab2] [ + ] (overflow handling)</text>

  <!-- Viewport / iframe -->
  <rect x="340" y="230" width="800" height="450" rx="6" fill="#fcfcfc" stroke="#bbb"/>
  <text x="360" y="260" font-size="14">Viewport (iframe-based content)</text>

  <!-- Footer -->
  <rect x="20" y="740" width="1160" height="40" rx="8" fill="#f5f5f5" stroke="#bbb"/>
  <text x="40" y="766" font-size="14">Footer: status / version</text>

  <!-- Interaction hints -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
  </defs>
  <line x1="180" y1="400" x2="340" y2="400" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="390" font-size="12">Menu select</text>
  <text x="360" y="690" font-size="12">Status messages flow to Footer</text>
</svg>